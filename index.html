<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Calendar</title>

<style>
:root{
  --bg:#0f1220;
  --blue:#0050c8;
  --blue2:#007bff;
  --white:#fff;
  --yellow:#ffd400;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  background:var(--bg);
  overflow:hidden;
  font-family:"Arial Black", "Inter", sans-serif;
}

/* MAIN */
.widget{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:var(--bg);
  overflow:hidden;
}

/* PERSONA UI FOG LAYER */
.widget::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 70% 30%, rgba(255,255,255,0.10), transparent 45%),
    radial-gradient(circle at 20% 80%, rgba(0,120,255,0.08), transparent 50%);
  z-index:0;
}

/* TOP LEFT UI BLOCK (HOLIDAY) */
.banner{
  position:absolute;
  top:18px;
  left:18px;
  z-index:30;
  padding:10px 18px;
  background:linear-gradient(90deg,#4bd0ff,#0057ff);
  color:white;
  font-weight:900;
  letter-spacing:2px;
  box-shadow:0 0 25px rgba(0,140,255,.4);
}

/* DIAGONAL MAIN STRIPE */
.band{
  position:absolute;
  width:220%;
  height:170px;
  top:48%;
  left:-50%;
  transform:rotate(14deg);
  background:linear-gradient(90deg,var(--blue),var(--blue2));
  z-index:1;
}

/* SECOND DARK LAYER STRIPE */
.band2{
  position:absolute;
  width:200%;
  height:90px;
  top:62%;
  left:-40%;
  transform:rotate(14deg);
  background:#002a66;
  opacity:.75;
  z-index:1;
}

/* DATE BLOCK (BIGGER + MORE “UI MASS”) */
.date{
  position:absolute;
  left:6%;
  top:22%;
  z-index:10;
  color:#fff;
}

.year{
  font-size:clamp(1.2rem,3vw,3rem);
  font-weight:900;
}

.month{
  font-size:clamp(1rem,2vw,1.8rem);
  opacity:.9;
}

.big{
  font-size:clamp(7rem,16vw,16rem);
  line-height:.8;
  font-weight:900;
}

/* DIAGONAL TIMELINE (CLEANER ALIGNMENT) */
.line{
  position:absolute;
  width:110%;
  height:3px;
  top:58%;
  left:-5%;
  background:white;
  transform:rotate(-35deg);
  z-index:5;
  opacity:.9;
}

/* DAYS */
.days{
  position:absolute;
  inset:0;
  z-index:10;
}

.day{
  position:absolute;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
  transition:.2s ease;
}

.day:hover{
  transform:translate(-50%,-50%) scale(1.22);
  z-index:50;
}

.num{
  font-size:clamp(2.5rem,4vw,4rem);
  font-weight:900;
}

.week{
  font-size:.75rem;
  letter-spacing:4px;
  opacity:.85;
}

/* MOON (FLAT PERSONA STYLE) */
.moon{
  width:clamp(34px,4vw,58px);
  height:clamp(34px,4vw,58px);
  border-radius:50%;
  margin:8px auto 0;
  background:#fff;
  box-shadow:0 0 12px rgba(255,255,255,.2);
}

/* CURRENT DAY MOON */
.today .moon{
  background:var(--yellow);
  box-shadow:0 0 18px var(--yellow), 0 0 40px rgba(255,212,0,.5);
  border:4px solid white;
}

/* TARGET RING (PERSONA STYLE) */
.ring{
  position:absolute;
  width:150px;
  height:150px;
  border-radius:50%;
  border:6px solid rgba(0,160,255,.5);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 2.8s infinite;
}

.ring::after{
  content:"";
  position:absolute;
  inset:16px;
  border-radius:50%;
  border:5px solid rgba(0,160,255,.25);
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(.85);}
  50%{transform:translate(-50%,-50%) scale(1.1);}
  100%{transform:translate(-50%,-50%) scale(.85);}
}
</style>
</head>

<body>

<div class="widget">

  <div class="banner" id="holiday">DAY OFF</div>

  <div class="band"></div>
  <div class="band2"></div>

  <div class="date">
    <div class="year" id="year"></div>
    <div class="month" id="month"></div>
    <div class="big" id="big"></div>
  </div>

  <div class="line"></div>
  <div class="days" id="days"></div>

</div>

<script>

const today=new Date();

const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
const week=["SUN","MON","TUE","WED","THU","FRI","SAT"];

document.getElementById("year").textContent=today.getFullYear();
document.getElementById("month").textContent=months[today.getMonth()];
document.getElementById("big").textContent=today.getDate();

/* MOON PHASE */
function phase(d){
  const n=new Date("2000-01-06T18:14:00Z");
  const p=((d-n)/86400000)%29.53;
  return p/29.53;
}

function moon(p){
  const m=document.createElement("div");
  m.className="moon";

  if(p<.05||p>.95){
    m.style.background="#111";
  }else if(p<.5){
    m.style.background="linear-gradient(90deg,#111 50%,#fff 50%)";
  }else{
    m.style.background="linear-gradient(90deg,#fff 50%,#111 50%)";
  }

  return m;
}

/* 8 DAY TIMELINE */
const container=document.getElementById("days");
const start=new Date(today);
start.setDate(today.getDate()-3);

for(let i=0;i<8;i++){
  const d=new Date(start);
  d.setDate(start.getDate()+i);

  const node=document.createElement("div");
  node.className="day";

  node.style.left=(20+i*9)+"%";
  node.style.top=(82-i*9)+"%";

  node.innerHTML=`
    <div class="num">${d.getDate()}</div>
    <div class="week">${week[d.getDay()]}</div>
  `;

  if(d.toDateString()===today.toDateString()){
    node.classList.add("today");

    const ring=document.createElement("div");
    ring.className="ring";
    node.appendChild(ring);
  }

  node.appendChild(moon(phase(d)));
  container.appendChild(node);
}

</script>

</body>
</html>
