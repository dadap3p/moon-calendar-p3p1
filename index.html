<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Persona 3 Calendar</title>

<style>

:root{
--bg:#171626;
--blue:#004bb5;
--blue2:#008cff;
--white:#fff;
--yellow:#ffe100;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:var(--bg);
font-family:"Inter",Arial,sans-serif;
}


.widget{

position:relative;
width:100%;
aspect-ratio:16/9;
min-height:300px;
overflow:hidden;
background:
linear-gradient(120deg,#10101d,#171626);

}


/* TOP LEFT HOLIDAY */

.banner{

position:absolute;
top:18px;
left:18px;
z-index:50;

padding:12px 28px;

background:
linear-gradient(90deg,#1da8ff,#004fc4);

color:white;

font-size:clamp(14px,2vw,28px);
font-weight:900;

letter-spacing:3px;

box-shadow:
0 0 30px #007cff55;

}


/* DIAGONAL STRIPES */

.stripe{

position:absolute;

width:150%;
height:210px;

left:-25%;
top:32%;

background:
linear-gradient(90deg,#003d98,#006cff);

transform:rotate(15deg);

z-index:1;

}


.stripe2{

position:absolute;

width:160%;
height:80px;

left:-30%;
top:12%;

background:#002d70;

transform:rotate(15deg);

z-index:0;

}


/* DATE */

.date{

position:absolute;

top:18%;
left:8%;

z-index:10;

color:white;

}


.year{

font-size:clamp(25px,3vw,50px);
font-weight:900;

}


.month{

font-weight:700;
letter-spacing:3px;

}


.big{

font-size:clamp(90px,16vw,250px);
line-height:.8;
font-weight:900;

}


/* LINE */

.timeline{

position:absolute;

width:90%;
height:4px;

background:white;

top:60%;
left:6%;

transform:rotate(-35deg);

z-index:5;

}


/* DAYS */


.days{
position:absolute;
inset:0;
z-index:20;
}


.day{

position:absolute;

transform:translate(-50%,-50%);

transition:.25s;

text-align:center;

}


.day:hover{

transform:
translate(-50%,-50%)
scale(1.3);

filter:
drop-shadow(0 0 20px white);

z-index:100;

}


.number{

color:white;

font-weight:900;

font-size:
clamp(30px,5vw,70px);

line-height:.8;

}


.label{

color:white;

font-weight:900;

letter-spacing:4px;

font-size:
clamp(10px,1.3vw,20px);

}


/* MOON */


.moon{

width:
clamp(28px,4vw,65px);

height:
clamp(28px,4vw,65px);

border-radius:50%;

margin:12px auto;

}


/* CURRENT */


.today .moon{

background:var(--yellow)!important;

border:
4px solid white;

box-shadow:

0 0 25px var(--yellow);

}


/* TARGET */


.ring{

position:absolute;

width:110px;
height:110px;

border-radius:50%;

border:
5px solid #65c7ff99;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

animation:pulse 2.5s infinite;

}


.ring:after{

content:"";

position:absolute;

inset:15px;

border-radius:50%;

border:
4px solid #65c7ff55;

}


@keyframes pulse{

50%{

transform:
translate(-50%,-50%)
scale(1.25);

opacity:.5;

}

}


</style>

</head>


<body>


<div class="widget">


<div class="banner">
休日 | <span id="holiday">Day off</span>
</div>


<div class="stripe"></div>

<div class="stripe2"></div>



<div class="date">

<div class="year" id="year"></div>

<div class="month" id="month"></div>

<div class="big" id="big"></div>

</div>


<div class="timeline"></div>


<div class="days" id="days"></div>


</div>





<script>


const now=new Date();



const months=[
"January","February","March","April",
"May","June","July","August",
"September","October","November","December"
];


const week=[
"SUN","MON","TUE","WED",
"THU","FRI","SAT"
];



document.getElementById("year").innerHTML=
now.getFullYear();


document.getElementById("month").innerHTML=
months[now.getMonth()];


document.getElementById("big").innerHTML=
now.getDate();





/* French holidays */


function easter(year){

let a=year%19;
let b=Math.floor(year/100);
let c=year%100;
let d=Math.floor(b/4);
let e=b%4;
let f=Math.floor((b+8)/25);
let g=Math.floor((b-f+1)/3);
let h=(19*a+b-d-g+15)%30;
let i=Math.floor(c/4);
let k=c%4;
let l=(32+2*e+2*i-h-k)%7;
let m=Math.floor((a+11*h+22*l)/451);

let month=Math.floor((h+l-7*m+114)/31);
let day=((h+l-7*m+114)%31)+1;

return new Date(year,month-1,day);

}



function holidays(date){


let y=date.getFullYear();

let eas=easter(y);


let movable={

[eas.getMonth()+1+"-"+(eas.getDate()+1)]:
"🇫🇷 Easter Monday",

[eas.getMonth()+1+"-"+(eas.getDate()+39)]:
"🇫🇷 Ascension",

[eas.getMonth()+1+"-"+(eas.getDate()+50)]:
"🇫🇷 Whit Monday"

};


let key=
(date.getMonth()+1)+"-"+date.getDate();



let fixed={

"1-1":"🇫🇷 New Year",
"5-1":"🇫🇷 Labour Day",
"5-8":"🇫🇷 Victory Day",
"7-14":"🇫🇷 Bastille Day",
"8-15":"🇫🇷 Assumption",
"11-1":"🇫🇷 All Saints",
"11-11":"🇫🇷 Armistice",
"12-25":"🇫🇷 Christmas"

};


return fixed[key]||movable[key]||"Day off";


}



document.getElementById("holiday").innerHTML=
holidays(now);






/* Moon */


function moonPhase(date){

let diff=
(date-new Date("2000-01-06"))/
86400000;

return (diff%29.53)/29.53;

}



function makeMoon(p){

let m=document.createElement("div");

m.className="moon";


if(p<.08)

m.style.background="#111";


else if(p<.25)

m.style.background=
"linear-gradient(90deg,#111 50%,white 50%)";


else if(p<.5)

m.style.background=
"radial-gradient(circle at left,white 70%,#111 75%)";


else if(p<.58)

m.style.background="white";


else

m.style.background=
"linear-gradient(90deg,white 50%,#111 50%)";


return m;

}





/* DAYS */


let box=document.getElementById("days");


let start=new Date(now);

start.setDate(now.getDate()-3);



for(let i=0;i<8;i++){


let d=new Date(start);

d.setDate(start.getDate()+i);



let node=document.createElement("div");

node.className="day";


node.style.left=
(18+i*10)+"%";


node.style.top=
(82-i*9)+"%";



let n=document.createElement("div");

n.className="number";

n.innerHTML=d.getDate();



let l=document.createElement("div");

l.className="label";

l.innerHTML=week[d.getDay()];



node.appendChild(n);
node.appendChild(l);



node.appendChild(
makeMoon(moonPhase(d))
);



if(d.toDateString()==now.toDateString()){


node.classList.add("today");


let r=document.createElement("div");

r.className="ring";

node.appendChild(r);

}



box.appendChild(node);


}



</script>

</body>
</html>
