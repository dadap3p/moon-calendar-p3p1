<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Moon Calendar</title>

<style>
:root{
  --bg:#070c18;
  --blue:#0a5bff;
  --blue2:#00a3ff;
  --white:#fff;
  --yellow:#f2d400;
}

/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  background:var(--bg);
  font-family:Inter, Arial, sans-serif;
  overflow:hidden;
}

/* WIDGET */
.widget{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:var(--bg);
  overflow:hidden;
}

/* TRANSLUCENT OVERLAY */
.widget::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 70% 40%, rgba(255,255,255,0.08), transparent 40%),
    linear-gradient(120deg, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
  z-index:0;
}

/* BLUE STRIPE */
.band{
  position:absolute;
  width:200%;
  height:200px;
  top:48%;
  left:-40%;
  transform:rotate(14deg);
  background:linear-gradient(90deg,var(--blue),var(--blue2));
  z-index:1;
}

/* HOLIDAY / EVENT */
.event-banner{
  position:absolute;
  top:18px;
  left:18px;
  z-index:50;
  padding:10px 18px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  box-shadow:0 0 25px rgba(0,120,255,0.35);
  letter-spacing:1px;
}

/* DATE BLOCK */
.month-block{
  position:absolute;
  top:18%;
  left:5%;
  z-index:20;
}
.year{color:#fff;font-weight:800;font-size:clamp(1rem,2vw,2.2rem);}
.month{color:#fff;font-weight:600;opacity:.9;}
.big-day{
  color:#fff;
  font-weight:900;
  font-size:clamp(5rem,14vw,16rem);
  line-height:0.9;
}

/* QUOTE */
.quote{
  position:absolute;
  bottom:18px;
  left:18px;
  max-width:40%;
  color:rgba(255,255,255,0.75);
  font-size:clamp(.8rem,1.2vw,1rem);
  font-style:italic;
  z-index:20;
}

/* TIMELINE */
.timeline{
  position:absolute;
  width:90%;
  height:3px;
  background:#fff;
  top:62%;
  left:5%;
  transform:rotate(-35deg);
  z-index:3;
}

/* DAYS */
.days{position:absolute;inset:0;z-index:10;}

.day-node{
  position:absolute;
  transform:translate(-50%,-50%);
  text-align:center;
  transition:.25s ease;
}

.day-node:hover{
  transform:translate(-50%,-50%) scale(1.25);
  z-index:99;
}

.day-number{
  color:#fff;
  font-weight:900;
  font-size:clamp(2rem,4vw,4.5rem);
}

.day-label{
  color:#fff;
  font-size:.75rem;
  letter-spacing:3px;
  opacity:.8;
}

/* MOON */
.moon{
  width:clamp(28px,4vw,60px);
  height:clamp(28px,4vw,60px);
  border-radius:50%;
  margin-top:8px;
}

/* TODAY MOON */
.today .moon{
  background:var(--yellow);
  border:3px solid #fff;
  box-shadow:0 0 20px rgba(242,212,0,.8);
}

/* TARGET RING */
.ring{
  position:absolute;
  width:160px;
  height:160px;
  border-radius:50%;
  border:8px solid rgba(0,170,255,.35);
  animation:pulse 3s infinite;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.ring::after{
  content:"";
  position:absolute;
  inset:18px;
  border-radius:50%;
  border:6px solid rgba(0,170,255,.2);
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(.9);}
  50%{transform:translate(-50%,-50%) scale(1);}
  100%{transform:translate(-50%,-50%) scale(.9);}
}
</style>
</head>

<body>
<div class="widget">

  <div class="event-banner" id="eventName"></div>

  <div class="band"></div>

  <div class="month-block">
    <div class="year" id="year"></div>
    <div class="month" id="month"></div>
    <div class="big-day" id="bigDay"></div>
  </div>

  <div class="timeline"></div>
  <div class="days" id="days"></div>

  <div class="quote" id="quote"></div>
</div>

<script>
const today = new Date();

/* ---------------------------
   FRENCH HOLIDAYS (MOVABLE)
----------------------------*/
function easterY(year){
  const a = year % 19,
        b = Math.floor(year/100),
        c = year % 100,
        d = Math.floor(b/4),
        e = b % 4,
        f = Math.floor((b+8)/25),
        g = Math.floor((b-f+1)/3),
        h = (19*a + b - d - g + 15) % 30,
        i = Math.floor(c/4),
        k = c % 4,
        l = (32 + 2*e + 2*i - h - k) % 7,
        m = Math.floor((a + 11*h + 22*l)/451),
        month = Math.floor((h + l - 7*m + 114)/31),
        day = ((h + l - 7*m + 114) % 31) + 1;

  return new Date(year, month-1, day);
}

function formatKey(d){
  return String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function buildHolidays(year){
  const easter = easterY(year);
  const addDays = (d,n)=> new Date(d.getTime()+n*86400000);

  return {
    "01-01":"🇫🇷 New Year",
    "05-01":"🇫🇷 Labour Day",
    "05-08":"🇫🇷 Victory Day",
    "07-14":"🇫🇷 Bastille Day",
    "08-15":"🇫🇷 Assumption",
    "11-01":"🇫🇷 All Saints",
    "11-11":"🇫🇷 Armistice",
    "12-25":"🇫🇷 Christmas",

    [formatKey(easter)]:"🐣 Easter Sunday",
    [formatKey(addDays(easter,1))]:"🐣 Easter Monday",
    [formatKey(addDays(easter,39))]:"☁ Ascension Day",
    [formatKey(addDays(easter,49))]:"✝ Pentecost",
    [formatKey(addDays(easter,50))]:"🇫🇷 Whit Monday"
  };
}

const holidays = buildHolidays(today.getFullYear());
const key = formatKey(today);

document.getElementById("eventName").textContent =
  holidays[key] || "Ordinary Day";

/* ---------------------------
   DATE UI
----------------------------*/
const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
const days=["SUN","MON","TUE","WED","THU","FRI","SAT"];

document.getElementById("year").textContent=today.getFullYear();
document.getElementById("month").textContent=months[today.getMonth()];
document.getElementById("bigDay").textContent=today.getDate();

/* ---------------------------
   QUOTES
----------------------------*/
const quotes=[
`“A book must be the axe for the frozen sea inside us.” — Kafka`,
`“He who has a why can bear almost any how.” — Nietzsche`,
`“Simplicity is the ultimate sophistication.” — Leonardo da Vinci`,
`“We are what we repeatedly do.” — Aristotle`,
`“In the middle of difficulty lies opportunity.” — Einstein`
];

document.getElementById("quote").textContent =
quotes[Math.floor(Math.random()*quotes.length)];

/* ---------------------------
   MOON PHASE (accurate-ish)
----------------------------*/
function moonPhase(date){
  const lp = 2551443;
  const newMoon = new Date("2000-01-06T18:14:00Z");
  return (((date - newMoon)/1000) % lp) / lp;
}

function moonStyle(p){
  if(p<0.03||p>0.97) return "#111";
  if(p<0.22) return "radial-gradient(circle at right,#fff 65%,#111 70%)";
  if(p<0.28) return "linear-gradient(90deg,#111 50%,#fff 50%)";
  if(p<0.47) return "radial-gradient(circle at left,#fff 85%,#111 100%)";
  if(p<0.53) return "#fff";
  if(p<0.72) return "radial-gradient(circle at left,#fff 65%,#111 70%)";
  if(p<0.78) return "linear-gradient(90deg,#fff 50%,#111 50%)";
  return "radial-gradient(circle at right,#fff 25%,#111 50%)";
}

/* ---------------------------
   8-DAY TIMELINE
----------------------------*/
const container=document.getElementById("days");
const start=new Date(today);
start.setDate(today.getDate()-3);

for(let i=0;i<8;i++){
  const d=new Date(start);
  d.setDate(start.getDate()+i);

  const node=document.createElement("div");
  node.className="day-node";

  node.style.left=(20+i*9)+"%";
  node.style.top=(84-i*9)+"%";

  const num=document.createElement("div");
  num.className="day-number";
  num.textContent=d.getDate();

  const label=document.createElement("div");
  label.className="day-label";
  label.textContent=days[d.getDay()];

  node.appendChild(num);
  node.appendChild(label);

  if(d.toDateString()===today.toDateString()){
    node.classList.add("today");

    const ring=document.createElement("div");
    ring.className="ring";
    node.appendChild(ring);

    const moon=document.createElement("div");
    moon.className="moon";
    node.appendChild(moon);
  }else{
    const moon=document.createElement("div");
    moon.className="moon";
    moon.style.background = moonStyle(moonPhase(d));
    node.appendChild(moon);
  }

  container.appendChild(node);
}

/* ---------------------------
   AUTO DAILY UPDATE
----------------------------*/
setTimeout(()=>location.reload(), 1000*60*60*24);
</script>

</body>
</html>
