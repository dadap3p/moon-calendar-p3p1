<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona 3 Calendar Rebuild</title>

<style>
:root{
  --bg:#0b0f1c;
  --blue:#0050c8;
  --blue2:#007dff;
  --white:#fff;
  --yellow:#ffd400;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:"Arial Black", Inter, sans-serif;
}

/* MAIN STAGE */
.widget{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  background:var(--bg);
}

/* PERSONA DEPTH FOG (IMPORTANT FOR LOOK) */
.widget::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 70% 25%, rgba(255,255,255,0.10), transparent 55%),
    radial-gradient(circle at 25% 80%, rgba(0,120,255,0.08), transparent 60%);
  z-index:0;
}

/* TOP LEFT BANNER */
.banner{
  position:absolute;
  top:18px;
  left:18px;
  z-index:30;
  padding:10px 18px;
  font-weight:900;
  letter-spacing:2px;
  color:white;
  background:linear-gradient(90deg,#3cc7ff,#0066ff);
  box-shadow:0 0 25px rgba(0,120,255,0.4);
}

/* DIAGONAL STRIPE (MAIN PERSONA PLANE) */
.band{
  position:absolute;
  width:260%;
  height:160px;
  top:50%;
  left:-70%;
  transform:rotate(18deg) skewX(-14deg);
  background:linear-gradient(90deg,var(--blue),var(--blue2));
  z-index:1;
}

/* SECONDARY STRIPE */
.band2{
  position:absolute;
  width:240%;
  height:90px;
  top:62%;
  left:-60%;
  transform:rotate(18deg) skewX(-14deg);
  background:#002a66;
  opacity:.7;
  z-index:1;
}

/* DATE BLOCK (HUGE UI MASS LIKE PERSONA) */
.date{
  position:absolute;
  left:6%;
  top:20%;
  z-index:10;
  color:white;
}

.year{
  font-size:clamp(1.2rem,3vw,3rem);
  font-weight:900;
}

.month{
  font-size:clamp(1rem,2vw,1.6rem);
  opacity:.9;
}

.big{
  font-size:clamp(7rem,16vw,18rem);
  font-weight:900;
  line-height:.8;
}

/* DIAGONAL TIMELINE (CLEAN GRID ALIGNMENT) */
.line{
  position:absolute;
  width:120%;
  height:3px;
  top:58%;
  left:-10%;
  background:white;
  transform:rotate(-35deg);
  z-index:5;
  opacity:.9;
}

/* DAYS SYSTEM */
.days{
  position:absolute;
  inset:0;
  z-index:10;
}

.day{
  position:absolute;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
  transition:.2s ease;
}

.day:hover{
  transform:translate(-50%,-50%) scale(1.22);
  z-index:50;
}

.num{
  font-size:clamp(2.5rem,4vw,4.5rem);
  font-weight:900;
}

.week{
  font-size:.75rem;
  letter-spacing:4px;
  opacity:.85;
}

/* MOON (CLEAN PERSONA STYLE) */
.moon{
  width:clamp(34px,4vw,58px);
  height:clamp(34px,4vw,58px);
  border-radius:50%;
  margin:8px auto 0;
  background:white;
  box-shadow:0 0 10px rgba(255,255,255,.2);
}

/* TODAY MOON (YELLOW FOCUS) */
.today .moon{
  background:var(--yellow);
  border:4px solid white;
  box-shadow:0 0 20px var(--yellow), 0 0 45px rgba(255,212,0,.5);
}

/* TARGET RING */
.ring{
  position:absolute;
  width:150px;
  height:150px;
  border-radius:50%;
  border:6px solid rgba(0,160,255,.5);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 2.8s infinite;
}

.ring::after{
  content:"";
  position:absolute;
  inset:16px;
  border-radius:50%;
  border:5px solid rgba(0,160,255,.25);
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(.85);}
  50%{transform:translate(-50%,-50%) scale(1.1);}
  100%{transform:translate(-50%,-50%) scale(.85);}
}
</style>
</head>

<body>

<div class="widget">

  <div class="banner" id="holiday">DAY OFF</div>

  <div class="band"></div>
  <div class="band2"></div>

  <div class="date">
    <div class="year" id="year"></div>
    <div class="month" id="month"></div>
    <div class="big" id="big"></div>
  </div>

  <div class="line"></div>
  <div class="days" id="days"></div>

</div>

<script>

const today = new Date();

/* -------------------------
   TEXT
--------------------------*/
const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
const week=["SUN","MON","TUE","WED","THU","FRI","SAT"];

document.getElementById("year").textContent=today.getFullYear();
document.getElementById("month").textContent=months[today.getMonth()];
document.getElementById("big").textContent=today.getDate();

/* -------------------------
   FRENCH HOLIDAYS (COMPLETE)
--------------------------*/
function easter(y){
  let a=y%19,b=Math.floor(y/100),c=y%100;
  let d=Math.floor(b/4),e=b%4;
  let f=Math.floor((b+8)/25);
  let g=Math.floor((b-f+1)/3);
  let h=(19*a+b-d-g+15)%30;
  let i=Math.floor(c/4),k=c%4;
  let l=(32+2*e+2*i-h-k)%7;
  let m=Math.floor((a+11*h+22*l)/451);
  let month=Math.floor((h+l-7*m+114)/31);
  let day=((h+l-7*m+114)%31)+1;
  return new Date(y,month-1,day);
}

function key(d){
  return String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

const easterDate=easter(today.getFullYear());

const holidays={
  "01-01":"🇫🇷 New Year",
  "05-01":"🇫🇷 Labour Day",
  "05-08":"🇫🇷 Victory Day",
  "07-14":"🇫🇷 Bastille Day",
  "08-15":"🇫🇷 Assumption",
  "11-01":"🇫🇷 All Saints",
  "11-11":"🇫🇷 Armistice",
  "12-25":"🇫🇷 Christmas",

  [key(easterDate)]:"🐣 Easter",
  [key(new Date(easterDate.getTime()+86400000))]:"🐣 Easter Monday"
};

document.getElementById("holiday").textContent =
holidays[key(today)] || "DAY OFF";

/* -------------------------
   MOON PHASE (ACCURATE BASE)
--------------------------*/
function moonPhase(d){
  const n=new Date("2000-01-06T18:14:00Z");
  const days=(d-n)/86400000;
  return (days%29.53)/29.53;
}

function moon(p){
  const m=document.createElement("div");
  m.className="moon";

  if(p<.03||p>.97) m.style.background="#111";
  else if(p<.5) m.style.background="linear-gradient(90deg,#111 50%,#fff 50%)";
  else m.style.background="linear-gradient(90deg,#fff 50%,#111 50%)";

  return m;
}

/* -------------------------
   PERFECT DIAGONAL GRID
--------------------------*/
const container=document.getElementById("days");
const start=new Date(today);
start.setDate(today.getDate()-3);

for(let i=0;i<8;i++){

  const d=new Date(start);
  d.setDate(start.getDate()+i);

  const node=document.createElement("div");
  node.className="day";

  /* CLEAN LINEAR VECTOR (KEY FIX FOR VISUAL MATCH) */
  node.style.left = (22 + i*8) + "%";
  node.style.top  = (78 - i*8) + "%";

  node.innerHTML=`
    <div class="num">${d.getDate()}</div>
    <div class="week">${week[d.getDay()]}</div>
  `;

  if(d.toDateString()===today.toDateString()){
    node.classList.add("today");

    const ring=document.createElement("div");
    ring.className="ring";
    node.appendChild(ring);
  }

  node.appendChild(moon(moonPhase(d)));
  container.appendChild(node);
}

</script>

</body>
</html>
