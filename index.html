<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Persona 3 Style Calendar</title>
<style>
:root{
  --bg:#151522;
  --blue:#004fb8;
  --blue2:#007cff;
  --white:#fff;
  --yellow:#ffe500;
}

/* Reset */
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:"Arial Black","Inter",sans-serif; }

/* Widget */
.widget{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  min-height:300px;
  overflow:hidden;
  background:#171724;
}

/* TOP HOLIDAY BAR */
.banner{
  position:absolute;
  top:15px;
  left:0;
  height:60px;
  width:260px;
  background:linear-gradient(90deg,#38c7ff,#005cff);
  display:flex;
  align-items:center;
  padding-left:25px;
  color:white;
  font-size:clamp(18px,3vw,32px);
  font-weight:900;
  letter-spacing:3px;
  z-index:20;
  box-shadow:0 0 25px #008cff;
}
.banner span{ font-size:.55em; margin-left:15px; }

/* DIAGONAL BANDS */
.band{ position:absolute; width:170%; height:220px; left:-35%; top:30%; background: linear-gradient(90deg,#0046a8,#0074ff); transform:rotate(14deg); z-index:2; }
.band2{ position:absolute; width:150%; height:140px; left:-30%; top:55%; background:#003b91; transform:rotate(14deg); opacity:.8; z-index:1; }

/* DATE */
.date{ position:absolute; left:7%; top:25%; z-index:5; color:white; }
.year{ font-size:clamp(25px,5vw,60px); font-weight:900; }
.month{ font-size:clamp(18px,2vw,30px); }
.big{ font-size:clamp(90px,18vw,260px); line-height:.75; }

/* TIMELINE */
.line{ position:absolute; height:4px; width:95%; top:58%; left:5%; background:white; transform:rotate(-35deg); z-index:10; }

/* DAYS */
.days{ position:absolute; inset:0; z-index:15; }
.day{ position:absolute; transform:translate(-50%,-50%); text-align:center; transition:.25s; color:white; }
.day:hover{ transform: translate(-50%,-50%) scale(1.25); filter: drop-shadow(0 0 25px white); z-index:50; }
.num{ font-size:clamp(35px,5vw,75px); font-weight:900; line-height:.9; }
.week{ letter-spacing:5px; font-size:clamp(12px,1.5vw,22px); }

/* MOONS - moon is a positioned container so ring can be centered inside */
.moon{
  width:clamp(35px,5vw,65px);
  height:clamp(35px,5vw,65px);
  border-radius:50%;
  margin:auto;
  margin-top:10px;
  background:white;
  position:relative; /* allows absolutely positioned ring to center inside */
  overflow:visible;
}

/* today's visual accent (border + glow) - background for lit portion is set inline by JS */
.today .moon{
  border:5px solid white;
  box-shadow: 0 0 20px var(--yellow), 0 0 50px var(--yellow);
}

/* TARGET (ring) - sized and positioned relative to the moon when appended inside it */
.ring{
  position:absolute;
  width:calc(100% + 20px);
  height:calc(100% + 20px);
  border-radius:50%;
  border: 4px solid rgba(0,160,255,.5);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 2.5s infinite;
  pointer-events:none;
}
.ring:after{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:50%;
  border: 4px solid rgba(0,160,255,.35);
}

/* pulse animation */
@keyframes pulse{
  0%{ transform: translate(-50%,-50%) scale(.8); }
  50%{ transform: translate(-50%,-50%) scale(1.1); }
  100%{ transform: translate(-50%,-50%) scale(.8); }
}
</style>
</head>
<body>
  <div class="widget">
    <div class="banner">休 日 <span id="holiday"> Day off </span></div>
    <div class="band"></div>
    <div class="band2"></div>

    <div class="date">
      <div class="year" id="year"></div>
      <div class="month" id="month"></div>
      <div class="big" id="big"></div>
    </div>

    <div class="line"></div>
    <div id="days" class="days"></div>
  </div>

<script>
const today = new Date();

/* MONTHS */
const months = [
  "January","February","March","April",
  "May","June","July","August",
  "September","October","November","December"
];
const week = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

document.getElementById("year").textContent = today.getFullYear();
document.getElementById("month").textContent = months[today.getMonth()];
document.getElementById("big").textContent = today.getDate();

/* FRENCH HOLIDAYS (kept minimal) */
function easter(y){
  let a = y % 19;
  let b = Math.floor(y/100);
  let c = y % 100;
  let d = Math.floor(b/4);
  let e = b % 4;
  let f = Math.floor((b+8)/25);
  let g = Math.floor((b-f+1)/3);
  let h = (19*a + b - d - g + 15) % 30;
  let i = Math.floor(c/4);
  let k = c % 4;
  let l = (32 + 2*e + 2*i - h - k) % 7;
  let m = Math.floor((a + 11*h + 22*l) / 451);
  let month = Math.floor((h + l - 7*m + 114) / 31);
  let day = ((h + l - 7*m + 114) % 31) + 1;
  return new Date(y, month - 1, day);
}

function holiday(date){
  const key = (date.getMonth()+1).toString().padStart(2,"0") + "-" + date.getDate().toString().padStart(2,"0");
  const e = easter(date.getFullYear());
  const movable = {
    // Easter Monday
    [(e.getMonth()+1).toString().padStart(2,"0") + "-" + (e.getDate()+1).toString().padStart(2,"0")]: "🇫🇷 Easter Monday"
  };
  return ({
    "01-01":"🇫🇷 New Year's Day",
    "05-01":"🇫🇷 Labour Day",
    "05-08":"🇫🇷 Victory Day",
    "07-14":"🇫🇷 Bastille Day",
    "08-15":"🇫🇷 Assumption",
    "11-01":"🇫🇷 All Saints",
    "11-11":"🇫🇷 Armistice",
    "12-25":"🇫🇷 Christmas"
  }[key] || movable[key] || "");
}

document.getElementById("holiday").textContent = holiday(today) || "Day off";

/* REAL MOON PHASE
   returns fraction 0..1 where 0 = new moon, ~0.5 = full moon */
function phase(date){
  const known = new Date("2000-01-06T18:14:00");
  const days = (date - known) / 86400000;
  return ((days % 29.530588) + 29.530588) % 29.530588 / 29.530588;
}

/* Create moon element; isToday toggles lit color to var(--yellow) */
function moon(p, isToday){
  const m = document.createElement("div");
  m.className = "moon";
  const shadow = Math.round(p * 100);
  const lightColor = isToday ? "var(--yellow)" : "white";

  if (p < 0.05 || p > 0.95) {
    m.style.background = `radial-gradient(circle, #111 55%, ${lightColor} 60%)`;
  } else if (p < 0.5) {
    m.style.background = `linear-gradient(90deg, #111 ${shadow}%, ${lightColor} ${shadow}%)`;
  } else {
    m.style.background = `linear-gradient(90deg, ${lightColor} ${100 - shadow}%, #111 ${100 - shadow}%)`;
  }

  return m;
}

/* CREATE 8 DAYS (3 days before today, today, 4 days after) */
const container = document.getElementById("days");
const start = new Date(today);
start.setDate(today.getDate() - 3);

for (let i = 0; i < 8; i++){
  const d = new Date(start);
  d.setDate(start.getDate() + i);

  const node = document.createElement("div");
  node.className = "day";
  node.style.left = (18 + i * 10) + "%";
  node.style.top = (82 - i * 9) + "%";

  const n = document.createElement("div");
  n.className = "num";
  n.textContent = d.getDate();

  const w = document.createElement("div");
  w.className = "week";
  w.textContent = week[d.getDay()];

  node.appendChild(n);
  node.appendChild(w);

 const isToday = (d.toDateString() === today.toDateString());

if (isToday) {
  // Move current date away from the timeline
  node.style.left = (18 + i * 10 + 6) + "%"; // push right
  node.style.top = (82 - i * 9 + 8) + "%";   // push down

  node.classList.add("today");
}

const moonEl = moon(phase(d), isToday);

if (isToday) {
  const r = document.createElement("div");
  r.className = "ring";
  moonEl.appendChild(r);
}

  node.appendChild(moonEl);
  container.appendChild(node);
}
</script>
</body>
</html>
