<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Persona 3 Calendar</title>

<style>
:root{
  --bg:#0b0f1c;
  --blue:#0a4cc9;
  --blue2:#00a2ff;
  --accent:#ffd400;
  --white:#ffffff;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:var(--bg);
  font-family: "Arial Black", sans-serif;
}

/* STAGE */
.widget{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
}

/* FOG DEPTH (Persona-style layering) */
.widget::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 70% 20%, rgba(255,255,255,.08), transparent 55%),
    radial-gradient(circle at 20% 80%, rgba(0,140,255,.10), transparent 60%);
  z-index:0;
}

/* TOP BANNER */
.banner{
  position:absolute;
  top:2vh;
  left:2vw;
  padding:10px 16px;
  font-weight:900;
  color:white;
  background:linear-gradient(90deg,#3cc7ff,#0057ff);
  letter-spacing:2px;
  z-index:10;
  box-shadow:0 0 20px rgba(0,120,255,.4);
}

/* DIAGONAL STRIPE */
.band{
  position:absolute;
  width:200%;
  height:14vh;
  top:52%;
  left:-40%;
  transform:rotate(18deg);
  background:linear-gradient(90deg,var(--blue),var(--blue2));
  z-index:1;
  opacity:.9;
}

/* DATE BLOCK */
.date{
  position:absolute;
  top:18%;
  left:6%;
  z-index:10;
  color:white;
}

.year{font-size:clamp(1rem,2.5vw,2.5rem); font-weight:900;}
.month{font-size:clamp(.9rem,2vw,1.3rem); opacity:.85;}
.big{font-size:clamp(5rem,12vw,14rem); line-height:.8;}

/* DIAGONAL GUIDE LINE */
.line{
  position:absolute;
  width:140%;
  height:2px;
  background:white;
  top:55%;
  left:-20%;
  transform:rotate(-32deg);
  opacity:.85;
  z-index:2;
}

/* DAYS */
.days{
  position:absolute;
  inset:0;
  z-index:5;
}

/* Each node */
.day{
  position:absolute;
  text-align:center;
  transform:translate(-50%,-50%);
  color:white;
  transition:.25s ease;
}

.day:hover{
  transform:translate(-50%,-50%) scale(1.15);
}

/* number */
.num{
  font-size:clamp(2rem,3.5vw,4rem);
  font-weight:900;
}

.week{
  font-size:.7rem;
  letter-spacing:3px;
  opacity:.8;
}

/* MOON */
.moon{
  width:clamp(28px,3vw,52px);
  height:clamp(28px,3vw,52px);
  border-radius:50%;
  margin:8px auto 0;
  background:conic-gradient(from 180deg,#111 0 50%, #fff 50% 100%);
  box-shadow:0 0 10px rgba(255,255,255,.15);
}

/* TODAY MOON = FULL YELLOW GLOW */
.today .moon{
  background:var(--accent);
  box-shadow:
    0 0 18px var(--accent),
    0 0 45px rgba(255,212,0,.45);
  border:3px solid white;
}

/* TARGET RING (anchored properly) */
.ring{
  position:absolute;
  inset:-18px;
  border-radius:50%;
  border:3px solid rgba(0,160,255,.55);
  animation:pulse 2.5s infinite;
  pointer-events:none;
}

.ring::after{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:50%;
  border:2px solid rgba(0,160,255,.25);
}

@keyframes pulse{
  0%{transform:scale(.9);}
  50%{transform:scale(1.1);}
  100%{transform:scale(.9);}
}
</style>
</head>

<body>

<div class="widget">

  <div class="banner" id="holiday">DAY OFF</div>

  <div class="band"></div>
  <div class="line"></div>

  <div class="date">
    <div class="year" id="year"></div>
    <div class="month" id="month"></div>
    <div class="big" id="big"></div>
  </div>

  <div class="days" id="days"></div>

</div>

<script>

const today = new Date();

const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const week=["SUN","MON","TUE","WED","THU","FRI","SAT"];

document.getElementById("year").textContent=today.getFullYear();
document.getElementById("month").textContent=months[today.getMonth()];
document.getElementById("big").textContent=today.getDate();

/* SIMPLE HOLIDAY MAP */
const holidays={
  "07-14":"Bastille Day",
  "01-01":"New Year",
  "12-25":"Christmas"
};

function key(d){
  return String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

document.getElementById("holiday").textContent =
holidays[key(today)] || "DAY OFF";

/* MOON */
function moon(){
  const m=document.createElement("div");
  m.className="moon";
  return m;
}

/* LAYOUT ENGINE (clean diagonal scaling) */
const container=document.getElementById("days");
const start=new Date(today);
start.setDate(today.getDate()-3);

for(let i=0;i<8;i++){

  const d=new Date(start);
  d.setDate(start.getDate()+i);

  const node=document.createElement("div");
  node.className="day";

  /* RESPONSIVE DIAGONAL VECTOR */
  const step = 7; // percent spacing (clean Persona diagonal)
  node.style.left = (20 + i * step) + "%";
  node.style.top  = (75 - i * step) + "%";

  node.innerHTML=`
    <div class="num">${d.getDate()}</div>
    <div class="week">${week[d.getDay()]}</div>
  `;

  const m = moon();
  node.appendChild(m);

  /* TODAY STATE */
  if(d.toDateString() === today.toDateString()){
    node.classList.add("today");

    const ring=document.createElement("div");
    ring.className="ring";
    node.appendChild(ring);
  }

  container.appendChild(node);
}

</script>

</body>
</html>
