<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Persona Moon Calendar</title>

<style>

:root{
    --bg:#081225;
    --blue:#0058d8;
    --blue2:#009dff;
    --white:#ffffff;
    --yellow:#f2d400;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:
        "Inter",
        Arial,
        sans-serif;
}

.widget{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    min-height:300px;
    overflow:hidden;
    background:var(--bg);
}

/* HOLIDAY BANNER */

.event-banner{

```
position:absolute;

top:28px;
left:20px;

z-index:50;

padding:12px 28px;

background:
linear-gradient(
    90deg,
    #59d0ff,
    #0066ff
);

color:white;

font-weight:900;

letter-spacing:2px;

transform:
rotate(-12deg);

box-shadow:
0 0 25px rgba(0,120,255,.4);
```

}


/* BLUE STRIPE */

.band{

    position:absolute;

    width:180%;
    height:190px;

    background:
    linear-gradient(
        90deg,
        #004dc4,
        #006cff
    );

    top:46%;
    left:-40%;

    transform:
    rotate(14deg);

    z-index:1;
}

/* DATE */

.month-block{

```
position:absolute;

top:18%;
left:4%;

z-index:20;

transform:
    rotate(-12deg);
```

}


.year{

    color:white;

    font-weight:900;

    font-size:
    clamp(
        1rem,
        2vw,
        2.5rem
    );
}

.month{

    color:white;

    font-size:
    clamp(
        .9rem,
        1.5vw,
        1.5rem
    );

    font-weight:600;
}

.big-day{

    color:white;

    font-weight:900;

    line-height:.85;

    font-size:
    clamp(
        6rem,
        16vw,
        18rem
    );

    text-shadow:
    4px 4px 0 rgba(0,0,0,.15);
}

/* TIMELINE */

.timeline{

    position:absolute;

    width:90%;

    height:4px;

    background:white;

    top:62%;
    left:5%;

    transform:
    rotate(-35deg);

    z-index:3;
}

.days{
    position:absolute;
    inset:0;
    z-index:10;
}

.day-node{

    position:absolute;

    text-align:center;

    transform:
    translate(-50%,-50%);

    transition:
    transform .25s ease,
    filter .25s ease;
}

.day-node:hover{

    transform:
    translate(-50%,-50%)
    scale(1.25);

    filter:
    drop-shadow(
        0 0 25px
        rgba(255,255,255,.4)
    );

    z-index:100;
}

.day-number{

    color:white;

    font-weight:900;

    line-height:1;

    text-shadow:
    2px 2px 0 rgba(0,0,0,.15);

    font-size:
    clamp(
        2rem,
        5vw,
        5rem
    );
}

.day-label{

    color:white;

    font-weight:700;

    letter-spacing:4px;

    font-size:
    clamp(
        .65rem,
        1vw,
        1rem
    );
}

/* MOONS */

.moon{

    width:
    clamp(
        24px,
        4vw,
        58px
    );

    height:
    clamp(
        24px,
        4vw,
        58px
    );

    border-radius:50%;

    margin-top:10px;
}

/* CURRENT DAY */

.today .moon{

    background:
    var(--yellow);

    border:
    4px solid white;

    box-shadow:
    0 0 25px
    rgba(242,212,0,.9);
}

/* TARGET RINGS */

.ring{

    position:absolute;

    width:180px;
    height:180px;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    border-radius:50%;

    border:
    10px solid
    rgba(80,180,255,.35);

    animation:
    pulse 3s infinite;

    pointer-events:none;
}

.ring::after{

    content:"";

    position:absolute;

    inset:20px;

    border-radius:50%;

    border:
    8px solid
    rgba(80,180,255,.25);
}

@keyframes pulse{

    0%{
        transform:
        translate(-50%,-50%)
        scale(.9);
    }

    50%{
        transform:
        translate(-50%,-50%)
        scale(1);
    }

    100%{
        transform:
        translate(-50%,-50%)
        scale(.9);
    }
}

</style>
</head>

<body>

<div class="widget">

    <div class="event-banner">
        <span id="eventName"></span>
    </div>

    <div class="band"></div>

    <div class="month-block">

        <div class="year" id="year"></div>

        <div class="month" id="month"></div>

        <div class="big-day" id="bigDay"></div>

    </div>

    <div class="timeline"></div>

    <div id="days" class="days"></div>

</div>

<script>

const today = new Date();

function getFrenchHolidays(year){

```
const frenchHolidays =
getFrenchHolidays(
    today.getFullYear()
); function easter(y){

    const a=y%19;
    const b=Math.floor(y/100);
    const c=y%100;
    const d=Math.floor(b/4);
    const e=b%4;
    const f=Math.floor((b+8)/25);
    const g=Math.floor((b-f+1)/3);
    const h=(19*a+b-d-g+15)%30;
    const i=Math.floor(c/4);
    const k=c%4;
    const l=(32+2*e+2*i-h-k)%7;
    const m=Math.floor((a+11*h+22*l)/451);

    const month=
    Math.floor((h+l-7*m+114)/31);

    const day=
    ((h+l-7*m+114)%31)+1;

    return new Date(y,month-1,day);
}

const holidays={};

function add(date,name){

    holidays[
        String(date.getMonth()+1)
        .padStart(2,"0")
        + "-"
        +
        String(date.getDate())
        .padStart(2,"0")
    ]=name;
}

const easterDate=easter(year);

const easterMonday=
new Date(easterDate);
easterMonday.setDate(
    easterMonday.getDate()+1
);

const ascension=
new Date(easterDate);
ascension.setDate(
    ascension.getDate()+39
);

const whitMonday=
new Date(easterDate);
whitMonday.setDate(
    whitMonday.getDate()+50
);

add(new Date(year,0,1),"🇫🇷 Jour de l'An");
add(easterMonday,"🇫🇷 Lundi de Pâques");
add(new Date(year,4,1),"🇫🇷 Fête du Travail");
add(new Date(year,4,8),"🇫🇷 Victoire 1945");
add(ascension,"🇫🇷 Ascension");
add(whitMonday,"🇫🇷 Lundi de Pentecôte");
add(new Date(year,6,14),"🇫🇷 Fête Nationale");
add(new Date(year,7,15),"🇫🇷 Assomption");
add(new Date(year,10,1),"🇫🇷 Toussaint");
add(new Date(year,10,11),"🇫🇷 Armistice");
add(new Date(year,11,25),"🇫🇷 Noël");

return holidays;
```

}


const holidayKey =
String(today.getMonth()+1)
.padStart(2,"0")
+
"-"
+
String(today.getDate())
.padStart(2,"0");

document.getElementById("eventName").textContent =
frenchHolidays[holidayKey]
||
"Ordinary Day";

const months=[
"January","February","March","April",
"May","June","July","August",
"September","October","November","December"
];

const weekdays=[
"SUN","MON","TUE","WED",
"THU","FRI","SAT"
];

document.getElementById("year").textContent =
today.getFullYear();

document.getElementById("month").textContent =
months[today.getMonth()];

document.getElementById("bigDay").textContent =
today.getDate();

function moonPhase(date){

    const lp = 2551443;

    const newMoon =
    new Date("2000-01-06T18:14:00Z");

    return (
    ((date-newMoon)/1000)%lp
    )/lp;
}

function createMoon(phase){

    const moon =
    document.createElement("div");

    moon.className =
    "moon";

    if(phase<.03||phase>.97)
        moon.style.background="#111";

    else if(phase<.22)
        moon.style.background=
        "radial-gradient(circle at right,#fff 65%,#111 70%)";

    else if(phase<.28)
        moon.style.background=
        "linear-gradient(90deg,#111 50%,#fff 50%)";

    else if(phase<.47)
        moon.style.background=
        "radial-gradient(circle at left,#fff 85%,#111 100%)";

    else if(phase<.53)
        moon.style.background="#fff";

    else if(phase<.72)
        moon.style.background=
        "radial-gradient(circle at left,#fff 65%,#111 70%)";

    else if(phase<.78)
        moon.style.background=
        "linear-gradient(90deg,#fff 50%,#111 50%)";

    else
        moon.style.background=
        "radial-gradient(circle at right,#fff 25%,#111 50%)";

    return moon;
}

const container =
document.getElementById("days");

const start =
new Date(today);

start.setDate(today.getDate()-3);

for(let i=0;i<8;i++){

    const d =
    new Date(start);

    d.setDate(start.getDate()+i);

    const node =
    document.createElement("div");

    node.className =
    "day-node";

    node.style.left =
    (20 + i*9) + "%";

    node.style.top =
    (84 - i*9) + "%";

    const num =
    document.createElement("div");

    num.className =
    "day-number";

    num.textContent =
    d.getDate();

    const label =
    document.createElement("div");

    label.className =
    "day-label";

    label.textContent =
    weekdays[d.getDay()];

    node.appendChild(num);
    node.appendChild(label);

    if(
        d.toDateString()
        ===
        today.toDateString()
    ){

        node.classList.add("today");

        const ring =
        document.createElement("div");

        ring.className =
        "ring";

        node.appendChild(ring);

        const moon =
        document.createElement("div");

        moon.className =
        "moon";

        node.appendChild(moon);

    }else{

        node.appendChild(
            createMoon(
                moonPhase(d)
            )
        );
    }

    container.appendChild(node);
}
function refreshAtMidnight(){

    const now=new Date();

    const next=
    new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate()+1,
        0,0,1
    );

    setTimeout(()=>{

        location.reload();

    },next-now);
}

refreshAtMidnight();
</script>

</body>
</html>
